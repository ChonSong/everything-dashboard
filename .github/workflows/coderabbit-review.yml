name: AI Code Review (CodeRabbit)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_url:
        description: 'PR URL to review manually'
        required: false

jobs:
  review:
    runs-on: ubuntu-latest
    name: CodeRabbit Review
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CodeRabbit CLI
        run: |
          curl -fsSL https://cli.coderabbit.ai/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Authenticate
        env:
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
        run: |
          if [ -n "$CODERABBIT_API_KEY" ]; then
            coderabbit auth login --api-key "$CODERABBIT_API_KEY"
          fi

      - name: Run Review
        env:
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
        run: |
          if [ -n "${{ inputs.pr_url }}" ]; then
            coderabbit review --repo "${{ inputs.pr_url }}"
          else
            coderabbit review
          fi
